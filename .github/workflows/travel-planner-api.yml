name: Travel Planner API

on:
  push:
    branches:
      - main
    paths:
      - "Backend/TravelPlannerApp/**"
      - ".github/workflows/travel-planner-api.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Backend/TravelPlannerApp/**"
      - ".github/workflows/travel-planner-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: travel-planner-api-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIRECTORY: Backend/TravelPlannerApp
  SOLUTION_PATH: Backend/TravelPlannerApp/TravelPlannerApp.sln
  API_PROJECT_PATH: Backend/TravelPlannerApp/src/TravelPlannerApp.Api/TravelPlannerApp.Api.csproj
  DOTNET_VERSION: 9.0.x

jobs:
  build_test_publish:
    name: Build, Test, Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Build solution
        run: dotnet build "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore -m:1 -v minimal

      - name: Test solution
        run: dotnet test "${{ env.SOLUTION_PATH }}" --configuration Release --no-build -m:1 -v minimal --artifacts-path "${{ runner.temp }}/test-artifacts"

      - name: Publish API
        run: dotnet publish "${{ env.API_PROJECT_PATH }}" --configuration Release --no-build --output "${{ runner.temp }}/api-publish"

      - name: Upload published API artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-api-publish
          path: ${{ runner.temp }}/api-publish
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Azure App Service
    needs: build_test_publish
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate deployment configuration
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          for key in AZURE_WEBAPP_NAME AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub configuration: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Download published API artifact
        uses: actions/download-artifact@v4
        with:
          name: travel-planner-api-publish
          path: ${{ runner.temp }}/api-publish

      - name: Azure login with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        if: ${{ vars.AZURE_WEBAPP_SLOT == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ runner.temp }}/api-publish

      - name: Deploy to Azure App Service slot
        if: ${{ vars.AZURE_WEBAPP_SLOT != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: ${{ vars.AZURE_WEBAPP_SLOT }}
          package: ${{ runner.temp }}/api-publish
