services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: travel-planner-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - travel-planner-sqlserver-data:/var/opt/mssql

volumes:
  travel-planner-sqlserver-data:
